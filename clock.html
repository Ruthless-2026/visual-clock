<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="中国地质大学（北京）杨金旅">
    <title>可视化时钟</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --clock-bg: #111827;
            --border: #1f2937;
            --text: #e5e7eb;
            --accent: #60a5fa;
            --accent-glow: #3b82f6;
            --second: #f43f5e;
            --second-glow: #e11d48;
            --gold: #fbbf24;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg);
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            user-select: none;
            overflow: hidden;
        }

        /* 背景动画粒子 */
        .bg-particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }
        .particle {
            position: absolute;
            width: 1.5px;
            height: 1.5px;
            background: var(--accent-glow);
            border-radius: 50%;
            animation: floatUp linear infinite;
            opacity: 0;
        }
        @keyframes floatUp {
            0%   { transform: translateY(100vh) scale(0); opacity: 0; }
            10%  { opacity: 0.8; }
            90%  { opacity: 0.2; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 36px;
            position: relative;
            z-index: 1;
        }

        /* ========== 标题 ========== */
        .title {
            color: #6b7280;
            font-size: 13px;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-weight: 500;
        }

        /* ========== 外圈光环 ========== */
        .glow-ring {
            position: absolute;
            width: 370px;
            height: 370px;
            border-radius: 50%;
            border: 2px solid transparent;
            background: conic-gradient(from 0deg, var(--accent-glow), var(--second-glow), #a78bfa, var(--accent-glow)) border-box;
            mask: radial-gradient(farthest-side, transparent calc(100% - 3px), #000 calc(100% - 2px));
            -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 3px), #000 calc(100% - 2px));
            filter: blur(6px);
            opacity: 0.5;
            animation: ringRotate 12s linear infinite;
            pointer-events: none;
        }
        @keyframes ringRotate {
            to { transform: rotate(360deg); }
        }

        /* ========== 模拟表盘 ========== */
        .clock-face-wrapper {
            position: relative;
            width: 370px;
            height: 370px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .clock-face {
            position: relative;
            width: 320px;
            height: 320px;
            border-radius: 50%;
            background: radial-gradient(circle at 50% 45%, #1e293b, #0f172a);
            border: 2px solid rgba(255, 255, 255, 0.08);
            box-shadow:
                0 0 80px rgba(59, 130, 246, 0.12),
                0 0 40px rgba(244, 63, 94, 0.06),
                0 25px 60px rgba(0, 0, 0, 0.6),
                inset 0 2px 20px rgba(255, 255, 255, 0.03),
                inset 0 -2px 20px rgba(0, 0, 0, 0.4);
            z-index: 2;
        }

        /* 内圈刻度环 */
        .clock-face::before {
            content: '';
            position: absolute;
            inset: 12px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.04);
            pointer-events: none;
        }

        /* 刻度 */
        .mark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform-origin: 0 0;
        }
        .mark.hour-mark {
            width: 4px;
            height: 16px;
            background: linear-gradient(to bottom, #d1d5db, #9ca3af);
            border-radius: 2px;
            box-shadow: 0 0 6px rgba(209, 213, 219, 0.3);
        }
        .mark.min-mark {
            width: 1.5px;
            height: 8px;
            background: rgba(107, 114, 128, 0.5);
            border-radius: 1px;
        }

        /* 数字 */
        .number {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #d1d5db;
            font-size: 21px;
            font-weight: 600;
            text-shadow: 0 0 10px rgba(209, 213, 219, 0.3);
            pointer-events: none;
        }

        /* 指针 */
        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: 50% 100%;
            border-radius: 4px;
        }
        .hand.hour {
            width: 6px;
            height: 66px;
            margin-left: -3px;
            background: linear-gradient(to top, #d1d5db, #f3f4f6);
            border-radius: 3px 3px 2px 2px;
            z-index: 3;
            box-shadow: 0 0 8px rgba(209, 213, 219, 0.2);
        }
        .hand.minute {
            width: 4px;
            height: 96px;
            margin-left: -2px;
            background: linear-gradient(to top, #60a5fa, #93c5fd);
            border-radius: 2px 2px 2px 2px;
            z-index: 4;
            box-shadow: 0 0 12px rgba(96, 165, 250, 0.4);
        }
        .hand.second {
            width: 2px;
            height: 118px;
            margin-left: -1px;
            background: linear-gradient(to top, #f43f5e, #fb7185);
            border-radius: 1px;
            z-index: 5;
            box-shadow: 0 0 10px rgba(244, 63, 94, 0.5);
        }
        .hand.second::after {
            content: '';
            position: absolute;
            bottom: -22px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 6px;
            background: var(--second);
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(244, 63, 94, 0.7);
        }

        /* 中心点 */
        .center-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 14px;
            height: 14px;
            background: radial-gradient(circle at 40% 40%, #fb7185, #e11d48);
            border-radius: 50%;
            z-index: 10;
            box-shadow:
                0 0 16px rgba(244, 63, 94, 0.6),
                0 0 30px rgba(244, 63, 94, 0.2);
            animation: dotPulse 2s ease-in-out infinite;
        }
        @keyframes dotPulse {
            0%, 100% { box-shadow: 0 0 16px rgba(244, 63, 94, 0.6), 0 0 30px rgba(244, 63, 94, 0.2); }
            50%      { box-shadow: 0 0 24px rgba(244, 63, 94, 0.8), 0 0 45px rgba(244, 63, 94, 0.35); }
        }

        /* 秒针拖尾 - 多层 */
        .trail {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 2px;
            margin-left: -1px;
            transform-origin: 50% 100%;
            border-radius: 1px;
            pointer-events: none;
            will-change: transform;
        }

        /* ========== 数字时钟 ========== */
        .digital-clock {
            display: flex;
            align-items: center;
            gap: 14px;
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 22px 44px;
            box-shadow:
                0 15px 50px rgba(0, 0, 0, 0.5),
                0 0 40px rgba(59, 130, 246, 0.06);
        }
        .time-block {
            font-size: 76px;
            font-weight: 200;
            color: #93c5fd;
            font-variant-numeric: tabular-nums;
            font-family: 'Cascadia Code', 'Consolas', 'Fira Code', monospace;
            min-width: 106px;
            text-align: center;
            letter-spacing: 6px;
            text-shadow: 0 0 30px rgba(147, 197, 253, 0.3);
            position: relative;
        }
        .time-block.seconds-block {
            color: #fda4af;
            text-shadow: 0 0 30px rgba(253, 164, 175, 0.3);
        }
        .colon {
            font-size: 56px;
            color: rgba(229, 231, 235, 0.5);
            font-weight: 200;
            animation: colonBlink 1s step-end infinite;
            line-height: 1;
        }
        @keyframes colonBlink {
            0%, 100% { opacity: 1; }
            50%      { opacity: 0.2; }
        }
        .date-display {
            color: #6b7280;
            font-size: 17px;
            text-align: center;
            letter-spacing: 3px;
            font-weight: 400;
        }

        /* ========== 高亮当前小时刻度 ========== */
        .mark.hour-mark.active {
            background: linear-gradient(to bottom, #fbbf24, #f59e0b);
            box-shadow: 0 0 12px rgba(251, 191, 36, 0.7);
            width: 5px;
            height: 18px;
        }
    </style>
</head>
<body>
    <!-- 背景粒子 -->
    <div class="bg-particles" id="bgParticles"></div>

    <div class="container">
        <span class="title">✦ Analog &amp; Digital Clock ✦</span>

        <!-- 模拟表盘 -->
        <div class="clock-face-wrapper">
            <div class="glow-ring"></div>
            <div class="clock-face" id="clockFace">
                <div class="center-dot"></div>
            </div>
        </div>

        <!-- 数字时钟 -->
        <div class="digital-clock">
            <span class="time-block" id="hours">00</span>
            <span class="colon">:</span>
            <span class="time-block" id="minutes">00</span>
            <span class="colon">:</span>
            <span class="time-block seconds-block" id="seconds">00</span>
        </div>
        <div class="date-display" id="dateDisplay"></div>
    </div>

    <script>
        // ==================== 背景粒子 ====================
        (function createParticles() {
            const container = document.getElementById('bgParticles');
            const count = 50;
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = `${Math.random() * 100}%`;
                p.style.animationDuration = `${8 + Math.random() * 20}s`;
                p.style.animationDelay = `${Math.random() * 15}s`;
                p.style.width = `${1 + Math.random() * 2}px`;
                p.style.height = p.style.width;
                container.appendChild(p);
            }
        })();

        // ==================== 时钟逻辑 ====================
        const clockFace = document.getElementById('clockFace');
        const hourHand = document.createElement('div');
        const minuteHand = document.createElement('div');
        const secondHand = document.createElement('div');

        // 创建指针
        hourHand.className = 'hand hour';
        minuteHand.className = 'hand minute';
        secondHand.className = 'hand second';
        clockFace.appendChild(hourHand);
        clockFace.appendChild(minuteHand);
        clockFace.appendChild(secondHand);

        // 多层拖尾
        const trailCount = 6;
        const trailEls = [];
        for (let i = 0; i < trailCount; i++) {
            const t = document.createElement('div');
            t.className = 'trail';
            t.style.height = `${100 + i * 6}px`;
            t.style.opacity = `${0.35 - i * 0.05}`;
            t.style.background = `linear-gradient(to top, transparent, rgba(244, 63, 94, ${0.45 - i * 0.06}))`;
            t.style.filter = `blur(${i * 0.6}px)`;
            clockFace.appendChild(t);
            trailEls.push(t);
        }

        // 反向拖尾（秒针尾部）
        const trailBack = document.createElement('div');
        trailBack.className = 'trail';
        trailBack.style.height = '30px';
        trailBack.style.opacity = '0.3';
        trailBack.style.background = 'linear-gradient(to bottom, transparent, rgba(244, 63, 94, 0.35))';
        trailBack.style.filter = 'blur(2px)';
        trailBack.style.zIndex = '1';
        clockFace.appendChild(trailBack);

        // 保存刻度引用
        const hourMarks = [];

        // 创建刻度
        for (let i = 1; i <= 60; i++) {
            const mark = document.createElement('div');
            const angle = i * 6 * Math.PI / 180;
            const radius = 142;

            if (i % 5 === 0) {
                mark.className = 'mark hour-mark';
                mark.dataset.hour = i / 5;
                mark.style.transform = `rotate(${i * 6}deg) translate(${radius - 8}px, -0.5px)`;
                clockFace.appendChild(mark);
                hourMarks.push(mark);

                // 数字
                const num = document.createElement('div');
                num.className = 'number';
                num.textContent = i / 5;
                num.style.transform =
                    `translate(calc(-50% + ${Math.sin(angle) * (radius - 28)}px),
                               calc(-50% - ${Math.cos(angle) * (radius - 28)}px))`;
                clockFace.appendChild(num);
            } else {
                mark.className = 'mark min-mark';
                mark.style.transform = `rotate(${i * 6}deg) translate(${radius - 4}px, -0.5px)`;
                clockFace.appendChild(mark);
            }
        }

        let prevHour = -1;

        // 更新时钟
        function updateClock() {
            const now = new Date();
            const h = now.getHours();
            const m = now.getMinutes();
            const s = now.getSeconds();
            const ms = now.getMilliseconds();

            // 指针角度（包含毫秒平滑）
            const secDeg = (s + ms / 1000) * 6;
            const minDeg = (m + s / 60) * 6;
            const hourDeg = ((h % 12) + m / 60) * 30;

            hourHand.style.transform = `rotate(${hourDeg}deg)`;
            minuteHand.style.transform = `rotate(${minDeg}deg)`;
            secondHand.style.transform = `rotate(${secDeg}deg)`;

            // 多层拖尾跟随秒针
            for (let i = 0; i < trailEls.length; i++) {
                trailEls[i].style.transform = `rotate(${secDeg - (i + 1) * 3}deg)`;
            }
            // 反向拖尾
            trailBack.style.transform = `rotate(${secDeg + 10}deg)`;

            // 高亮当前小时刻度
            const currentHour12 = h % 12 === 0 ? 12 : h % 12;
            if (currentHour12 !== prevHour) {
                hourMarks.forEach(m => m.classList.remove('active'));
                const activeMark = hourMarks.find(m => parseInt(m.dataset.hour) === currentHour12);
                if (activeMark) activeMark.classList.add('active');
                prevHour = currentHour12;
            }

            // 数字显示
            document.getElementById('hours').textContent = String(h).padStart(2, '0');
            document.getElementById('minutes').textContent = String(m).padStart(2, '0');
            document.getElementById('seconds').textContent = String(s).padStart(2, '0');

            // 日期
            const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
            document.getElementById('dateDisplay').textContent =
                `${now.getFullYear()}年${now.getMonth() + 1}月${now.getDate()}日 星期${weekdays[now.getDay()]}`;

            requestAnimationFrame(updateClock);
        }

        updateClock();
    </script>
</body>
</html>
