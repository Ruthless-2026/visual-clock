<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="中国地质大学（北京）杨金旅">
    <title>可视化时钟 - 星空版</title>
    <style>
        :root {
            --bg: #020210;
            --clock-bg: #0d111e;
            --text: #e5e7eb;
            --accent: #60a5fa;
            --accent-glow: #3b82f6;
            --second: #f43f5e;
            --gold: #fbbf24;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #020210;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            user-select: none;
            overflow: hidden;
        }

        /* ===== Canvas 星空背景 ===== */
        #starCanvas {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 36px;
            position: relative;
            z-index: 1;
        }

        .title {
            color: #6b7280;
            font-size: 13px;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-weight: 500;
        }

        /* ===== 旋转光环 ===== */
        .glow-ring {
            position: absolute;
            width: 370px;
            height: 370px;
            border-radius: 50%;
            border: 2px solid transparent;
            background: conic-gradient(from 0deg, var(--accent-glow), var(--second), #a78bfa, var(--accent-glow)) border-box;
            mask: radial-gradient(farthest-side, transparent calc(100% - 3px), #000 calc(100% - 2px));
            -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 3px), #000 calc(100% - 2px));
            filter: blur(6px);
            opacity: 0.5;
            animation: ringRotate 12s linear infinite;
            pointer-events: none;
        }
        @keyframes ringRotate { to { transform: rotate(360deg); } }

        /* ===== 行星轨道系统 ===== */
        .orbit-system {
            position: absolute;
            width: 370px;
            height: 370px;
            pointer-events: none;
            z-index: 0;
        }
        .orbit-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            border-radius: 50%;
            border: 1px dashed rgba(255,255,255,0.04);
            transform: translate(-50%, -50%);
        }
        .orbit-track {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 1px;
            height: 1px;
            animation: orbitSpin var(--orbit-dur) linear infinite;
        }
        @keyframes orbitSpin { to { transform: rotate(360deg); } }
        .planet-body {
            position: absolute;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px var(--glow), 0 0 25px var(--glow);
        }
        .planet-ring {
            position: absolute;
            border-radius: 50%;
            border: 2px solid;
            transform: translate(-50%, -50%) rotateX(75deg);
            opacity: 0.5;
        }

        /* ===== 模拟表盘 ===== */
        .clock-face-wrapper {
            position: relative;
            width: 370px;
            height: 370px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .clock-face {
            position: relative;
            width: 320px;
            height: 320px;
            border-radius: 50%;
            background: radial-gradient(circle at 50% 45%, #1e293b, #0f172a);
            border: 2px solid rgba(255,255,255,0.08);
            box-shadow:
                0 0 80px rgba(59,130,246,0.12),
                0 0 40px rgba(244,63,94,0.06),
                0 25px 60px rgba(0,0,0,0.6),
                inset 0 2px 20px rgba(255,255,255,0.03),
                inset 0 -2px 20px rgba(0,0,0,0.4);
            z-index: 2;
        }
        .clock-face::before {
            content: '';
            position: absolute;
            inset: 12px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.04);
            pointer-events: none;
        }

        /* 刻度 */
        .mark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform-origin: 0 0;
        }
        .mark.hour-mark {
            width: 4px;
            height: 16px;
            background: linear-gradient(to bottom, #d1d5db, #9ca3af);
            border-radius: 2px;
            box-shadow: 0 0 6px rgba(209,213,219,0.3);
        }
        .mark.hour-mark.active {
            background: linear-gradient(to bottom, #fbbf24, #f59e0b);
            box-shadow: 0 0 14px rgba(251,191,36,0.8);
            width: 5px;
            height: 18px;
        }
        .mark.min-mark {
            width: 1.5px;
            height: 8px;
            background: rgba(107,114,128,0.5);
            border-radius: 1px;
        }

        .number {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #d1d5db;
            font-size: 21px;
            font-weight: 600;
            text-shadow: 0 0 10px rgba(209,213,219,0.3);
            pointer-events: none;
        }

        /* 指针 */
        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: 50% 100%;
            border-radius: 4px;
        }
        .hand.hour {
            width: 6px;
            height: 66px;
            margin-left: -3px;
            background: linear-gradient(to top, #d1d5db, #f3f4f6);
            border-radius: 3px 3px 2px 2px;
            z-index: 3;
            box-shadow: 0 0 8px rgba(209,213,219,0.2);
        }
        .hand.minute {
            width: 4px;
            height: 96px;
            margin-left: -2px;
            background: linear-gradient(to top, #60a5fa, #93c5fd);
            border-radius: 2px;
            z-index: 4;
            box-shadow: 0 0 12px rgba(96,165,250,0.4);
        }
        .hand.second {
            width: 2px;
            height: 118px;
            margin-left: -1px;
            background: linear-gradient(to top, #f43f5e, #fb7185);
            border-radius: 1px;
            z-index: 5;
            box-shadow: 0 0 10px rgba(244,63,94,0.5);
        }
        .hand.second::after {
            content: '';
            position: absolute;
            bottom: -22px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 6px;
            background: var(--second);
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(244,63,94,0.7);
        }

        .center-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 14px;
            height: 14px;
            background: radial-gradient(circle at 40% 40%, #fb7185, #e11d48);
            border-radius: 50%;
            z-index: 10;
            box-shadow: 0 0 16px rgba(244,63,94,0.6), 0 0 30px rgba(244,63,94,0.2);
            animation: dotPulse 2s ease-in-out infinite;
        }
        @keyframes dotPulse {
            0%,100% { box-shadow: 0 0 16px rgba(244,63,94,0.6), 0 0 30px rgba(244,63,94,0.2); }
            50% { box-shadow: 0 0 24px rgba(244,63,94,0.8), 0 0 45px rgba(244,63,94,0.35); }
        }

        /* 秒针拖尾 */
        .trail {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 2px;
            margin-left: -1px;
            transform-origin: 50% 100%;
            border-radius: 1px;
            pointer-events: none;
            will-change: transform;
        }

        /* ===== 数字时钟 ===== */
        .digital-clock {
            display: flex;
            align-items: center;
            gap: 14px;
            background: rgba(17,24,39,0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 22px 44px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.5), 0 0 40px rgba(59,130,246,0.06);
        }
        .time-block {
            font-size: 76px;
            font-weight: 200;
            color: #93c5fd;
            font-variant-numeric: tabular-nums;
            font-family: 'Cascadia Code', 'Consolas', 'Fira Code', monospace;
            min-width: 106px;
            text-align: center;
            letter-spacing: 6px;
            text-shadow: 0 0 30px rgba(147,197,253,0.3);
        }
        .time-block.seconds-block {
            color: #fda4af;
            text-shadow: 0 0 30px rgba(253,164,175,0.3);
        }
        .colon {
            font-size: 56px;
            color: rgba(229,231,235,0.5);
            font-weight: 200;
            animation: colonBlink 1s step-end infinite;
            line-height: 1;
        }
        @keyframes colonBlink {
            0%,100% { opacity: 1; }
            50% { opacity: 0.2; }
        }
        .date-display {
            color: #6b7280;
            font-size: 17px;
            text-align: center;
            letter-spacing: 3px;
            font-weight: 400;
        }
    </style>
</head>
<body>
    <canvas id="starCanvas"></canvas>

    <div class="container">
        <span class="title">✦ Analog &amp; Digital Clock ✦</span>

        <div class="clock-face-wrapper" id="clockWrapper">
            <div class="glow-ring"></div>
            <div class="orbit-system" id="orbitSystem"></div>
            <div class="clock-face" id="clockFace">
                <div class="center-dot"></div>
            </div>
        </div>

        <div class="digital-clock">
            <span class="time-block" id="hours">00</span>
            <span class="colon">:</span>
            <span class="time-block" id="minutes">00</span>
            <span class="colon">:</span>
            <span class="time-block seconds-block" id="seconds">00</span>
        </div>
        <div class="date-display" id="dateDisplay"></div>
    </div>

    <script>
        // ==================== Canvas 星空背景 ====================
        (function() {
            const canvas = document.getElementById('starCanvas');
            const ctx = canvas.getContext('2d');
            const stars = [];
            const STAR_COUNT = 350;
            let shootingStars = [];
            const nebulae = [];

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            // 恒星数据
            for (let i = 0; i < STAR_COUNT; i++) {
                stars.push({
                    x: Math.random() * 2000,
                    y: Math.random() * 2000,
                    r: Math.random() * 2.2 + 0.4,
                    speed: Math.random() * 0.02 + 0.005,
                    offset: Math.random() * Math.PI * 2,
                    baseAlpha: Math.random() * 0.7 + 0.3,
                    color: (() => {
                        const r = Math.random();
                        if (r < 0.08) return '#a78bfa';
                        if (r < 0.16) return '#fbbf24';
                        if (r < 0.30) return '#60a5fa';
                        return '#ffffff';
                    })()
                });
            }

            // 星云
            for (let i = 0; i < 4; i++) {
                nebulae.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 250 + 100,
                    color: ['rgba(167,139,250,0.025)','rgba(59,130,246,0.025)',
                            'rgba(244,63,94,0.015)','rgba(251,191,36,0.015)'][i],
                    vx: (Math.random() - 0.5) * 0.08,
                    vy: (Math.random() - 0.5) * 0.08
                });
            }

            function spawnMeteor() {
                if (Math.random() < 0.015 && shootingStars.length < 3) {
                    shootingStars.push({
                        x: Math.random() * canvas.width * 0.9,
                        y: Math.random() * canvas.height * 0.4,
                        vx: Math.random() * 5 + 3,
                        vy: Math.random() * 2.5 + 1,
                        life: 1,
                        decay: Math.random() * 0.018 + 0.012,
                        len: Math.random() * 100 + 50
                    });
                }
            }

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // 画星云
                for (const n of nebulae) {
                    const g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
                    g.addColorStop(0, n.color);
                    g.addColorStop(1, 'transparent');
                    ctx.fillStyle = g;
                    ctx.beginPath();
                    ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
                    ctx.fill();
                    n.x += n.vx;
                    n.y += n.vy;
                    if (n.x < -n.r) n.x = canvas.width + n.r;
                    if (n.x > canvas.width + n.r) n.x = -n.r;
                    if (n.y < -n.r) n.y = canvas.height + n.r;
                    if (n.y > canvas.height + n.r) n.y = -n.r;
                }

                // 闪烁恒星
                const t = Date.now();
                for (const s of stars) {
                    const a = s.baseAlpha * (0.5 + 0.5 * Math.sin(t * s.speed + s.offset));
                    ctx.fillStyle = s.color;
                    ctx.globalAlpha = a;
                    ctx.beginPath();
                    ctx.arc(s.x % canvas.width, s.y % canvas.height, s.r, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;

                // 流星
                spawnMeteor();
                for (let i = shootingStars.length - 1; i >= 0; i--) {
                    const m = shootingStars[i];
                    const grad = ctx.createLinearGradient(m.x, m.y,
                        m.x - m.vx * m.len * 0.12, m.y - m.vy * m.len * 0.12);
                    grad.addColorStop(0, `rgba(255,255,255,${m.life})`);
                    grad.addColorStop(1, 'rgba(255,255,255,0)');
                    ctx.strokeStyle = grad;
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.moveTo(m.x, m.y);
                    ctx.lineTo(m.x - m.vx * m.len * 0.12, m.y - m.vy * m.len * 0.12);
                    ctx.stroke();
                    m.x += m.vx;
                    m.y += m.vy;
                    m.life -= m.decay;
                    if (m.life <= 0) shootingStars.splice(i, 1);
                }

                requestAnimationFrame(draw);
            }
            draw();
        })();

        // ==================== 行星环绕系统 ====================
        (function() {
            const orbitSystem = document.getElementById('orbitSystem');
            const planets = [
                { orbitR: 205, size: 9,  color: '#f59e0b', glow: '#fbbf24', period: 8,  ring: false, angle: 0 },
                { orbitR: 255, size: 6,  color: '#60a5fa', glow: '#93c5fd', period: 14, ring: false, angle: 110 },
                { orbitR: 305, size: 15, color: '#e2c498', glow: '#fde68a', period: 22, ring: true,  angle: 230 },
                { orbitR: 355, size: 5,  color: '#a78bfa', glow: '#c4b5fd', period: 30, ring: false, angle: 55 },
                { orbitR: 415, size: 11, color: '#f43f5e', glow: '#fb7185', period: 40, ring: false, angle: 175 },
            ];

            planets.forEach((p, idx) => {
                // 虚线轨道
                const ring = document.createElement('div');
                ring.className = 'orbit-ring';
                ring.style.width = `${p.orbitR * 2}px`;
                ring.style.height = `${p.orbitR * 2}px`;
                orbitSystem.appendChild(ring);

                // 轨道动画
                const track = document.createElement('div');
                track.className = 'orbit-track';
                track.style.setProperty('--orbit-dur', `${p.period}s`);
                track.style.animationDelay = `-${p.period * p.angle / 360}s`;
                if (idx % 2 === 1) track.style.animationDirection = 'reverse';
                orbitSystem.appendChild(track);

                // 行星
                const body = document.createElement('div');
                body.className = 'planet-body';
                body.style.width = `${p.size}px`;
                body.style.height = `${p.size}px`;
                body.style.background = `radial-gradient(circle at 35% 35%, ${p.glow}, ${p.color})`;
                body.style.setProperty('--glow', p.glow);
                body.style.left = `${p.orbitR}px`;
                body.style.top = '0px';
                track.appendChild(body);

                // 土星环
                if (p.ring) {
                    const pr = document.createElement('div');
                    pr.className = 'planet-ring';
                    pr.style.width = `${p.size * 3}px`;
                    pr.style.height = `${p.size * 1.2}px`;
                    pr.style.borderColor = p.glow;
                    pr.style.left = `${p.orbitR}px`;
                    pr.style.top = '0px';
                    track.appendChild(pr);
                }
            });
        })();

        // ==================== 时钟逻辑 ====================
        const clockFace = document.getElementById('clockFace');
        const hourHand = document.createElement('div');
        const minuteHand = document.createElement('div');
        const secondHand = document.createElement('div');

        hourHand.className = 'hand hour';
        minuteHand.className = 'hand minute';
        secondHand.className = 'hand second';
        clockFace.appendChild(hourHand);
        clockFace.appendChild(minuteHand);
        clockFace.appendChild(secondHand);

        const trailEls = [];
        for (let i = 0; i < 6; i++) {
            const t = document.createElement('div');
            t.className = 'trail';
            t.style.height = `${100 + i * 6}px`;
            t.style.opacity = `${0.35 - i * 0.05}`;
            t.style.background = `linear-gradient(to top, transparent, rgba(244,63,94,${0.45 - i * 0.06}))`;
            t.style.filter = `blur(${i * 0.6}px)`;
            clockFace.appendChild(t);
            trailEls.push(t);
        }

        const trailBack = document.createElement('div');
        trailBack.className = 'trail';
        trailBack.style.height = '30px';
        trailBack.style.opacity = '0.3';
        trailBack.style.background = 'linear-gradient(to bottom, transparent, rgba(244,63,94,0.35))';
        trailBack.style.filter = 'blur(2px)';
        trailBack.style.zIndex = '1';
        clockFace.appendChild(trailBack);

        const hourMarks = [];

        for (let i = 1; i <= 60; i++) {
            const mark = document.createElement('div');
            const angle = i * 6 * Math.PI / 180;
            const radius = 142;

            if (i % 5 === 0) {
                mark.className = 'mark hour-mark';
                mark.dataset.hour = i / 5;
                mark.style.transform = `rotate(${i * 6}deg) translate(${radius - 8}px, -0.5px)`;
                clockFace.appendChild(mark);
                hourMarks.push(mark);

                const num = document.createElement('div');
                num.className = 'number';
                num.textContent = i / 5;
                num.style.transform =
                    `translate(calc(-50% + ${Math.sin(angle) * (radius - 28)}px),
                               calc(-50% - ${Math.cos(angle) * (radius - 28)}px))`;
                clockFace.appendChild(num);
            } else {
                mark.className = 'mark min-mark';
                mark.style.transform = `rotate(${i * 6}deg) translate(${radius - 4}px, -0.5px)`;
                clockFace.appendChild(mark);
            }
        }

        let prevHour = -1;

        function updateClock() {
            const now = new Date();
            const h = now.getHours();
            const m = now.getMinutes();
            const s = now.getSeconds();
            const ms = now.getMilliseconds();

            const secDeg = (s + ms / 1000) * 6;
            const minDeg = (m + s / 60) * 6;
            const hourDeg = ((h % 12) + m / 60) * 30;

            hourHand.style.transform = `rotate(${hourDeg}deg)`;
            minuteHand.style.transform = `rotate(${minDeg}deg)`;
            secondHand.style.transform = `rotate(${secDeg}deg)`;

            for (let i = 0; i < trailEls.length; i++) {
                trailEls[i].style.transform = `rotate(${secDeg - (i + 1) * 3}deg)`;
            }
            trailBack.style.transform = `rotate(${secDeg + 10}deg)`;

            const currentHour12 = h % 12 === 0 ? 12 : h % 12;
            if (currentHour12 !== prevHour) {
                hourMarks.forEach(m => m.classList.remove('active'));
                const activeMark = hourMarks.find(m => parseInt(m.dataset.hour) === currentHour12);
                if (activeMark) activeMark.classList.add('active');
                prevHour = currentHour12;
            }

            document.getElementById('hours').textContent = String(h).padStart(2, '0');
            document.getElementById('minutes').textContent = String(m).padStart(2, '0');
            document.getElementById('seconds').textContent = String(s).padStart(2, '0');

            const weekdays = ['日','一','二','三','四','五','六'];
            document.getElementById('dateDisplay').textContent =
                `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 星期${weekdays[now.getDay()]}`;

            requestAnimationFrame(updateClock);
        }

        updateClock();
    </script>
</body>
</html>
